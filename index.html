<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zombie Deathmatch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: monospace; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; padding: 16px 24px;
    display: flex; justify-content: space-between; pointer-events: none; z-index: 10;
  }
  .hud-item { color: #fff; font-size: 18px; text-shadow: 0 0 6px #000, 0 0 3px #000; }
  #health-bar-bg {
    width: 200px; height: 16px; background: #333; border: 2px solid #555; border-radius: 3px; margin-top: 4px;
  }
  #health-bar { height: 100%; background: #4f4; border-radius: 2px; transition: width 0.2s, background 0.2s; }
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 24px; height: 24px; pointer-events: none; z-index: 10;
  }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.7); }
  #crosshair::before { width: 2px; height: 24px; left: 11px; top: 0; }
  #crosshair::after { width: 24px; height: 2px; top: 11px; left: 0; }
  #game-over {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); display: none; justify-content: center;
    align-items: center; flex-direction: column; z-index: 20;
  }
  #game-over h1 { color: #e33; font-size: 64px; margin-bottom: 16px; }
  #game-over p { color: #ccc; font-size: 24px; margin-bottom: 24px; }
  #game-over button {
    padding: 12px 32px; font-size: 20px; font-family: monospace;
    background: #e33; color: #fff; border: none; cursor: pointer; border-radius: 4px;
  }
  #game-over button:hover { background: #f55; }
  #wave-announce {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
    color: #ff4; font-size: 48px; text-shadow: 0 0 20px #f80; pointer-events: none;
    z-index: 15; opacity: 0; transition: opacity 0.3s;
  }
  #ammo-display { color: #ff4; }
  #minimap {
    position: fixed; bottom: 16px; right: 16px; width: 160px; height: 160px;
    border: 2px solid #555; background: rgba(0,0,0,0.6); z-index: 10;
  }
  #connection-status {
    position: fixed; bottom: 16px; left: 16px; color: #ff4; font-size: 14px;
    font-family: monospace; z-index: 10; text-shadow: 0 0 4px #000;
  }
  #player-label {
    position: fixed; top: 50px; left: 24px; font-size: 14px; font-family: monospace;
    z-index: 10; text-shadow: 0 0 4px #000; pointer-events: none;
  }
  #scoreboard {
    position: fixed; top: 80px; right: 16px; background: rgba(0,0,0,0.6);
    border: 1px solid #444; padding: 8px 12px; font-family: monospace;
    font-size: 13px; color: #ccc; z-index: 10; min-width: 150px; pointer-events: none;
  }
  #scoreboard h3 { color: #ff4; margin-bottom: 6px; font-size: 14px; }
  .score-row { display: flex; justify-content: space-between; margin: 2px 0; }
  #kill-feed {
    position: fixed; bottom: 190px; right: 16px; font-family: monospace;
    font-size: 13px; z-index: 10; pointer-events: none; text-align: right;
  }
  .feed-msg {
    color: #ccc; text-shadow: 0 0 4px #000; margin: 2px 0;
    animation: feedFade 4s forwards;
  }
  @keyframes feedFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }

  /* ── Mobile touch controls ── */
  .touch-joystick {
    position: fixed; bottom: 30px; width: 130px; height: 130px;
    border-radius: 50%; background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15); z-index: 30;
    display: none; /* shown via JS on touch devices */
  }
  .touch-joystick .stick {
    position: absolute; width: 50px; height: 50px; border-radius: 50%;
    background: rgba(255,255,255,0.25); top: 50%; left: 50%;
    transform: translate(-50%, -50%); pointer-events: none;
  }
  #joystick-move { left: 30px; }
  #joystick-aim { right: 30px; }
  #btn-reload {
    position: fixed; bottom: 180px; right: 40px; width: 60px; height: 60px;
    border-radius: 50%; background: rgba(255,200,0,0.2); border: 2px solid rgba(255,200,0,0.4);
    color: #ff4; font-family: monospace; font-size: 13px; font-weight: bold;
    z-index: 30; display: none;
  }
  @media (pointer: coarse) {
    .touch-joystick { display: block; }
    #btn-reload { display: flex; align-items: center; justify-content: center; }
    #crosshair { display: none; }
    #minimap { width: 100px; height: 100px; bottom: 170px; right: 10px; }
    #scoreboard { font-size: 11px; min-width: 120px; top: 60px; right: 8px; padding: 4px 8px; }
    #hud { padding: 8px 12px; }
    .hud-item { font-size: 13px; }
    #health-bar-bg { width: 120px; height: 12px; }
    #connection-status { bottom: 170px; left: 10px; font-size: 11px; }
    #kill-feed { bottom: 280px; font-size: 11px; }
  }
</style>
</head>
<body>
<div id="hud">
  <div>
    <div class="hud-item">HP</div>
    <div id="health-bar-bg"><div id="health-bar" style="width:100%"></div></div>
  </div>
  <div class="hud-item" id="ammo-display">AMMO: 30 / 30</div>
  <div class="hud-item">ZOMBIE KILLS: <span id="kill-count">0</span></div>
  <div class="hud-item">WAVE: <span id="wave-num">1</span></div>
</div>
<div id="crosshair"></div>
<div id="wave-announce"></div>
<canvas id="minimap"></canvas>
<div id="connection-status">CONNECTING...</div>
<div id="player-label" style="color:#38f">—</div>
<div id="scoreboard"><h3>SCOREBOARD</h3><div id="scores"></div></div>
<div id="kill-feed"></div>
<div id="joystick-move" class="touch-joystick"><div class="stick" id="stick-move"></div></div>
<div id="joystick-aim" class="touch-joystick"><div class="stick" id="stick-aim"></div></div>
<button id="btn-reload" ontouchstart="reload()">R</button>
<div id="game-over">
  <h1>YOU DIED</h1>
  <p>Zombie Kills: <span id="final-kills">0</span> &mdash; Player Kills: <span id="final-pks">0</span> &mdash; Wave: <span id="final-wave">1</span></p>
  <button onclick="respawn()">RESPAWN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── PLAYER COLORS (cycles for unlimited players) ──
const PLAYER_COLORS = [0x3388ff, 0xff5588, 0x44dd66, 0xffaa22, 0xaa44ff, 0x22dddd, 0xff4444, 0x88ff44];
function colorForId(id) { return PLAYER_COLORS[(id - 1) % PLAYER_COLORS.length]; }
function hexStr(c) { return '#' + c.toString(16).padStart(6, '0'); }

// ── GLOBALS ──
let scene, camera, renderer, clock;
let player, playerHealth = 100, playerSpeed = 14;
let zombieKills = 0, playerKills = 0, wave = 1, gameOver = false, dead = false;
let ammo = 30, maxAmmo = 30, reloading = false;
let gunPivot, rain;

const keys = {};
const bullets = []; // { mesh, dir, life, ownerId }
const zombies = [];
const buildings = [];
const bloodSplats = [];
const MAP_SIZE = 250;
const ZOMBIE_BASE_SPEED = 3.5;
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
let mouseWorldPos = new THREE.Vector3();

// ── AUDIO ──
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function sfxShoot() {
  const ctx = ensureAudio(); const t = ctx.currentTime;
  // Noise burst for gunshot
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
  const src = ctx.createBufferSource(); src.buffer = buf;
  // Bandpass for punch
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 800; bp.Q.value = 1.5;
  const gain = ctx.createGain(); gain.gain.setValueAtTime(0.35, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
  src.start(t); src.stop(t + 0.08);
  // Low thump
  const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(40, t + 0.06);
  const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.3, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  osc.connect(g2); g2.connect(ctx.destination); osc.start(t); osc.stop(t + 0.06);
}

function sfxZombieSpawn() {
  const ctx = ensureAudio(); const t = ctx.currentTime;
  // Low creepy groan
  const osc = ctx.createOscillator(); osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80 + Math.random() * 30, t);
  osc.frequency.linearRampToValueAtTime(60 + Math.random() * 20, t + 0.4);
  // Wobble for eerie effect
  const lfo = ctx.createOscillator(); lfo.frequency.value = 5 + Math.random() * 3;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 15;
  lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  const gain = ctx.createGain(); gain.gain.setValueAtTime(0.08, t);
  gain.gain.linearRampToValueAtTime(0.12, t + 0.1);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 400;
  osc.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
  lfo.start(t); osc.start(t); osc.stop(t + 0.5); lfo.stop(t + 0.5);
}

function sfxZombieDeath() {
  const ctx = ensureAudio(); const t = ctx.currentTime;
  // Squelchy splat
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600;
  const gain = ctx.createGain(); gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  src.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
  src.start(t); src.stop(t + 0.15);
  // Descending tone
  const osc = ctx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(300, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
  const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.15, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(g2); g2.connect(ctx.destination); osc.start(t); osc.stop(t + 0.2);
}

function sfxPlayerHit() {
  const ctx = ensureAudio(); const t = ctx.currentTime;
  // Dull impact thud
  const osc = ctx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(60, t + 0.1);
  const gain = ctx.createGain(); gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  osc.connect(gain); gain.connect(ctx.destination); osc.start(t); osc.stop(t + 0.15);
  // Crunch noise
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 4);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g2 = ctx.createGain(); g2.gain.setValueAtTime(0.15, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  src.connect(g2); g2.connect(ctx.destination); src.start(t); src.stop(t + 0.05);
}

function sfxWave() {
  const ctx = ensureAudio(); const t = ctx.currentTime;
  // Ominous rising horn
  const osc = ctx.createOscillator(); osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, t); osc.frequency.linearRampToValueAtTime(120, t + 0.8);
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 300;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.001, t); gain.gain.linearRampToValueAtTime(0.15, t + 0.3);
  gain.gain.linearRampToValueAtTime(0.15, t + 0.6); gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
  osc.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + 1.2);
  // Second voice for depth
  const osc2 = ctx.createOscillator(); osc2.type = 'sine';
  osc2.frequency.setValueAtTime(120, t); osc2.frequency.linearRampToValueAtTime(180, t + 0.8);
  const g2 = ctx.createGain();
  g2.gain.setValueAtTime(0.001, t); g2.gain.linearRampToValueAtTime(0.08, t + 0.4);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
  osc2.connect(g2); g2.connect(ctx.destination); osc2.start(t); osc2.stop(t + 1.2);
}

function sfxReload() {
  const ctx = ensureAudio(); const t = ctx.currentTime;
  // Click-clack
  for (let i = 0; i < 2; i++) {
    const delay = i * 0.15;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.03, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / data.length, 6);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2000 + i * 1500; bp.Q.value = 2;
    const gain = ctx.createGain(); gain.gain.setValueAtTime(0.2, t + delay); gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.03);
    src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
    src.start(t + delay); src.stop(t + delay + 0.03);
  }
}

function sfxZombieMoan() {
  const ctx = ensureAudio(); const t = ctx.currentTime;
  const dur = 0.6 + Math.random() * 0.8;
  const baseFreq = 70 + Math.random() * 40;

  // Vocal formant — shaped noise + oscillator
  const osc = ctx.createOscillator(); osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.linearRampToValueAtTime(baseFreq * (0.8 + Math.random() * 0.3), t + dur * 0.3);
  osc.frequency.linearRampToValueAtTime(baseFreq * (0.6 + Math.random() * 0.2), t + dur);

  // Slow wobble for that undead warble
  const lfo = ctx.createOscillator(); lfo.frequency.value = 3 + Math.random() * 4;
  const lfoG = ctx.createGain(); lfoG.gain.value = 8 + Math.random() * 10;
  lfo.connect(lfoG); lfoG.connect(osc.frequency);

  // Formant filter — vowel-ish resonance
  const formant = ctx.createBiquadFilter(); formant.type = 'bandpass';
  formant.frequency.setValueAtTime(300 + Math.random() * 200, t);
  formant.frequency.linearRampToValueAtTime(200 + Math.random() * 150, t + dur);
  formant.Q.value = 3 + Math.random() * 4;

  // Second formant for thickness
  const formant2 = ctx.createBiquadFilter(); formant2.type = 'bandpass';
  formant2.frequency.value = 600 + Math.random() * 400;
  formant2.Q.value = 2;

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.001, t);
  gain.gain.linearRampToValueAtTime(0.14 + Math.random() * 0.06, t + dur * 0.15);
  gain.gain.linearRampToValueAtTime(0.12 + Math.random() * 0.05, t + dur * 0.7);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);

  // Breathy noise layer
  const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1);
  const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer = noiseBuf;
  const noiseLp = ctx.createBiquadFilter(); noiseLp.type = 'bandpass';
  noiseLp.frequency.value = 250 + Math.random() * 200; noiseLp.Q.value = 1;
  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.001, t);
  noiseGain.gain.linearRampToValueAtTime(0.05, t + dur * 0.2);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + dur);

  osc.connect(formant); formant.connect(formant2); formant2.connect(gain); gain.connect(ctx.destination);
  noiseSrc.connect(noiseLp); noiseLp.connect(noiseGain); noiseGain.connect(ctx.destination);
  lfo.start(t); osc.start(t); noiseSrc.start(t);
  osc.stop(t + dur); lfo.stop(t + dur); noiseSrc.stop(t + dur);
}

let zombieMoanTimer = 0;

// ── BACKGROUND MUSIC ──
let musicStarted = false;
function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  const ctx = ensureAudio();

  // Dark ambient drone loop using oscillators
  function playDrone() {
    const t = ctx.currentTime;
    const dur = 8; // loop length

    // Deep bass drone
    const bass = ctx.createOscillator(); bass.type = 'sine';
    bass.frequency.setValueAtTime(40, t);
    bass.frequency.linearRampToValueAtTime(45, t + dur * 0.5);
    bass.frequency.linearRampToValueAtTime(40, t + dur);
    const bassGain = ctx.createGain();
    bassGain.gain.setValueAtTime(0.06, t);
    bassGain.gain.linearRampToValueAtTime(0.08, t + dur * 0.3);
    bassGain.gain.linearRampToValueAtTime(0.06, t + dur);
    bass.connect(bassGain); bassGain.connect(ctx.destination);
    bass.start(t); bass.stop(t + dur);

    // Eerie pad (detuned saw pair)
    const notes = [55, 58.27, 51.91, 55]; // Am-ish
    const noteIdx = Math.floor(Math.random() * notes.length);
    const freq = notes[noteIdx];

    const pad1 = ctx.createOscillator(); pad1.type = 'sawtooth'; pad1.frequency.value = freq;
    const pad2 = ctx.createOscillator(); pad2.type = 'sawtooth'; pad2.frequency.value = freq * 1.005; // slight detune
    const padLp = ctx.createBiquadFilter(); padLp.type = 'lowpass';
    padLp.frequency.setValueAtTime(200, t);
    padLp.frequency.linearRampToValueAtTime(400, t + dur * 0.4);
    padLp.frequency.linearRampToValueAtTime(150, t + dur);
    const padGain = ctx.createGain();
    padGain.gain.setValueAtTime(0.001, t);
    padGain.gain.linearRampToValueAtTime(0.035, t + dur * 0.3);
    padGain.gain.linearRampToValueAtTime(0.001, t + dur);
    pad1.connect(padLp); pad2.connect(padLp); padLp.connect(padGain); padGain.connect(ctx.destination);
    pad1.start(t); pad2.start(t); pad1.stop(t + dur); pad2.stop(t + dur);

    // Occasional high eerie whistle
    if (Math.random() > 0.5) {
      const delay = Math.random() * 3;
      const whist = ctx.createOscillator(); whist.type = 'sine';
      whist.frequency.setValueAtTime(800 + Math.random() * 400, t + delay);
      whist.frequency.linearRampToValueAtTime(600 + Math.random() * 300, t + delay + 2);
      const wLp = ctx.createBiquadFilter(); wLp.type = 'lowpass'; wLp.frequency.value = 1200;
      const wGain = ctx.createGain();
      wGain.gain.setValueAtTime(0.001, t + delay);
      wGain.gain.linearRampToValueAtTime(0.015, t + delay + 0.5);
      wGain.gain.linearRampToValueAtTime(0.001, t + delay + 2);
      whist.connect(wLp); wLp.connect(wGain); wGain.connect(ctx.destination);
      whist.start(t + delay); whist.stop(t + delay + 2);
    }

    // Heartbeat-ish pulse (very subtle)
    for (let p = 0; p < 4; p++) {
      const pt = t + p * 2;
      const beat = ctx.createOscillator(); beat.type = 'sine';
      beat.frequency.setValueAtTime(50, pt); beat.frequency.exponentialRampToValueAtTime(30, pt + 0.15);
      const bg = ctx.createGain();
      bg.gain.setValueAtTime(0.08, pt); bg.gain.exponentialRampToValueAtTime(0.001, pt + 0.2);
      beat.connect(bg); bg.connect(ctx.destination);
      beat.start(pt); beat.stop(pt + 0.2);
      // Double-beat
      const beat2 = ctx.createOscillator(); beat2.type = 'sine';
      beat2.frequency.setValueAtTime(45, pt + 0.25); beat2.frequency.exponentialRampToValueAtTime(25, pt + 0.4);
      const bg2 = ctx.createGain();
      bg2.gain.setValueAtTime(0.05, pt + 0.25); bg2.gain.exponentialRampToValueAtTime(0.001, pt + 0.45);
      beat2.connect(bg2); bg2.connect(ctx.destination);
      beat2.start(pt + 0.25); beat2.stop(pt + 0.45);
    }

    // Schedule next loop
    setTimeout(playDrone, (dur - 0.5) * 1000);
  }

  playDrone();
}

// ── MULTIPLAYER ──
let ws = null, myId = null, isHost = false;
const remotePlayers = {}; // id -> { mesh, gunPivot, targetX/Z/Y/RotY/GunRotY, hp, dead }
let syncTimer = 0;
const SYNC_RATE = 1 / 20;

// ── SCORES ──
const scores = {}; // id -> { zombie: n, player: n }

// ── MOBILE TOUCH ──
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touchMove = { active: false, id: null, dx: 0, dz: 0 }; // left joystick
const touchAim = { active: false, id: null, dx: 0, dz: 0 };  // right joystick
let mobileShootTimer = 0;
const MOBILE_SHOOT_RATE = 0.18; // seconds between auto-shots

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => {
    document.getElementById('connection-status').textContent = 'CONNECTED';
    document.getElementById('connection-status').style.color = '#4f4';
  };
  ws.onmessage = (e) => handleNetMessage(JSON.parse(e.data));
  ws.onclose = () => {
    document.getElementById('connection-status').textContent = 'DISCONNECTED — REFRESH TO RECONNECT';
    document.getElementById('connection-status').style.color = '#f44';
  };
}

function updateScoreboard() {
  const el = document.getElementById('scores');
  // Ensure local player is in scores
  if (myId && !scores[myId]) scores[myId] = { zombie: 0, player: 0 };
  scores[myId].zombie = zombieKills;
  scores[myId].player = playerKills;

  const sorted = Object.entries(scores).sort((a, b) => (b[1].player + b[1].zombie) - (a[1].player + a[1].zombie));
  el.innerHTML = sorted.map(([id, s]) => {
    const c = hexStr(colorForId(Number(id)));
    const me = Number(id) === myId ? ' (you)' : '';
    return `<div class="score-row"><span style="color:${c}">P${id}${me}</span><span>${s.player}pk / ${s.zombie}zk</span></div>`;
  }).join('');
}

function handleNetMessage(msg) {
  switch (msg.type) {
    case 'init':
      myId = msg.id;
      isHost = msg.isHost;
      document.getElementById('player-label').textContent = `P${myId}` + (isHost ? ' (HOST)' : '');
      document.getElementById('player-label').style.color = hexStr(colorForId(myId));
      player.children[0].material.color.setHex(colorForId(myId));
      scores[myId] = { zombie: 0, player: 0 };
      // Create meshes for existing players
      msg.existingPlayers.forEach(pid => { if (!remotePlayers[pid]) createRemotePlayer(pid); });
      if (!isHost) { zombies.forEach(z => scene.remove(z.mesh)); zombies.length = 0; }
      updateScoreboard();
      break;

    case 'player_joined':
      if (!remotePlayers[msg.id]) createRemotePlayer(msg.id);
      scores[msg.id] = scores[msg.id] || { zombie: 0, player: 0 };
      addKillFeed(`<span style="color:${hexStr(colorForId(msg.id))}">P${msg.id}</span> joined`);
      updateScoreboard();
      break;

    case 'player_left':
      if (remotePlayers[msg.id]) { scene.remove(remotePlayers[msg.id].mesh); delete remotePlayers[msg.id]; }
      addKillFeed(`<span style="color:${hexStr(colorForId(msg.id))}">P${msg.id}</span> left`);
      delete scores[msg.id];
      updateScoreboard();
      break;

    case 'become_host':
      isHost = true;
      document.getElementById('player-label').textContent = `P${myId} (HOST)`;
      break;

    case 'position': {
      if (!remotePlayers[msg.id]) createRemotePlayer(msg.id);
      const rp = remotePlayers[msg.id];
      rp.targetX = msg.x; rp.targetZ = msg.z; rp.targetY = msg.y;
      rp.targetRotY = msg.rotY; rp.targetGunRotY = msg.gunRotY;
      rp.dead = msg.dead;
      rp.mesh.visible = !msg.dead;
      break;
    }

    case 'shoot': {
      sfxShoot();
      const dir = new THREE.Vector3(msg.dx, msg.dy, msg.dz);
      const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.12, 4, 4), new THREE.MeshBasicMaterial({ color: 0xffff44 }));
      bullet.position.set(msg.ox, msg.oy, msg.oz);
      scene.add(bullet);
      bullets.push({ mesh: bullet, dir, life: 2.0, ownerId: msg.id });
      const flash = new THREE.PointLight(0xffaa00, 3, 8);
      flash.position.set(msg.ox, msg.oy, msg.oz);
      scene.add(flash);
      setTimeout(() => scene.remove(flash), 50);
      break;
    }

    case 'zombie_sync': {
      if (isHost) break;
      while (zombies.length < msg.zombies.length) spawnZombieMesh();
      while (zombies.length > msg.zombies.length) { scene.remove(zombies.pop().mesh); }
      for (let i = 0; i < msg.zombies.length; i++) {
        const zd = msg.zombies[i];
        zombies[i].mesh.position.set(zd.x, zd.y, zd.z);
        zombies[i].mesh.rotation.y = zd.ry;
        zombies[i].hp = zd.hp; zombies[i].speed = zd.speed;
      }
      break;
    }

    case 'zombie_kill': {
      if (msg.index >= 0 && msg.index < zombies.length) {
        const z = zombies[msg.index];
        for (let s = 0; s < 3; s++) createBloodSplat(z.mesh.position.x+(Math.random()-0.5)*1.5, z.mesh.position.z+(Math.random()-0.5)*1.5);
        scene.remove(z.mesh);
        zombies.splice(msg.index, 1);
      }
      if (scores[msg.id]) scores[msg.id].zombie++;
      updateScoreboard();
      break;
    }

    case 'player_hit': {
      // A remote player tells us we got hit
      if (msg.targetId === myId && !dead) {
        damagePlayer(15);
        if (dead) {
          addKillFeed(`<span style="color:${hexStr(colorForId(msg.id))}">P${msg.id}</span> killed <span style="color:${hexStr(colorForId(myId))}">P${myId} (you)</span>`);
        }
      }
      // Scoreboard: attacker killed target
      if (msg.killed) {
        if (scores[msg.id]) scores[msg.id].player++;
        addKillFeed(`<span style="color:${hexStr(colorForId(msg.id))}">P${msg.id}</span> killed <span style="color:${hexStr(colorForId(msg.targetId))}">P${msg.targetId}</span>`);
        updateScoreboard();
      }
      break;
    }

    case 'player_died':
      if (remotePlayers[msg.id]) { remotePlayers[msg.id].dead = true; remotePlayers[msg.id].mesh.visible = false; }
      break;

    case 'wave':
      wave = msg.wave;
      document.getElementById('wave-num').textContent = wave;
      const announce = document.getElementById('wave-announce');
      announce.textContent = `WAVE ${wave}`;
      announce.style.opacity = 1;
      setTimeout(() => announce.style.opacity = 0, 2000);
      break;
  }
}

function createRemotePlayer(id) {
  const rp = new THREE.Group();
  const color = colorForId(id);
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.5), new THREE.MeshLambertMaterial({ color }));
  body.position.y = 1.2; body.castShadow = true; rp.add(body);

  head.position.y = 2.15; head.castShadow = true; rp.add(head);

  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.8), new THREE.MeshLambertMaterial({ color: 0x444444 }));
  gun.position.set(0.5, 0, -0.3); gun.castShadow = true; rpGunPivot.add(gun); rp.add(rpGunPivot);

  tag.position.y = 3; tag.scale.set(1.5, 0.4, 1); rp.add(tag);

  scene.add(rp);
  remotePlayers[id] = { mesh: rp, gunPivot: rpGunPivot, targetX: 0, targetZ: 0, targetY: 0, targetRotY: 0, targetGunRotY: 0, dead: false };
}

function setupJoystick(containerId, stickId, state) {
  const container = document.getElementById(containerId);
  const stick = document.getElementById(stickId);
  const radius = 65; // half of 130px container
  const maxDist = 40; // max stick travel

  container.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    state.active = true;
    state.id = t.identifier;
    updateStick(t);
  }, { passive: false });

  container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === state.id) { updateStick(t); break; }
    }
  }, { passive: false });

  const endTouch = (e) => {
    for (const t of e.changedTouches) {
      if (t.identifier === state.id) {
        state.active = false; state.id = null; state.dx = 0; state.dz = 0;
        stick.style.transform = 'translate(-50%, -50%)';
        break;
      }
    }
  };
  container.addEventListener('touchend', endTouch);
  container.addEventListener('touchcancel', endTouch);

  function updateStick(touch) {
    const rect = container.getBoundingClientRect();
    const cx = rect.left + radius, cy = rect.top + radius;
    let dx = touch.clientX - cx, dy = touch.clientY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
    stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    // Normalize to -1..1
    state.dx = dx / maxDist;
    state.dz = dy / maxDist;
  }
}

function createVegetation() {
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x3a2a1a });
  const deadLeafMat = new THREE.MeshLambertMaterial({ color: 0x2a3a1a, transparent: true, opacity: 0.85 });
  const darkLeafMat = new THREE.MeshLambertMaterial({ color: 0x1a2a10, transparent: true, opacity: 0.8 });
  const bushMat = new THREE.MeshLambertMaterial({ color: 0x223311 });
  const deadBushMat = new THREE.MeshLambertMaterial({ color: 0x443322 });
  const mushroomCapMat = new THREE.MeshLambertMaterial({ color: 0x884422, transparent: true, opacity: 0.9 });
  const mushroomStemMat = new THREE.MeshLambertMaterial({ color: 0xccbb99 });
  const graveMat = new THREE.MeshLambertMaterial({ color: 0x555555 });

  // Seeded-ish random for consistent placement
  function sr(seed) { let s=seed; return ()=>{ s=Math.sin(s*9301+49297)%1; return Math.abs(s); }; }
  const rand = sr(42);

  // ── Dead / creepy trees ──
  for (let i = 0; i < 80; i++) {
    const x = (rand() - 0.5) * (MAP_SIZE - 10);
    const z = (rand() - 0.5) * (MAP_SIZE - 10);
    // Skip if too close to a building
    if (checkBuildingCollision(x, z, 3)) continue;

    const tree = new THREE.Group();
    const height = 4 + rand() * 8;
    const trunkRadius = 0.2 + rand() * 0.25;

    // Trunk — slightly tapered cylinder
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(trunkRadius * 0.6, trunkRadius, height, 5),
      trunkMat
    );
    trunk.position.y = height / 2;
    trunk.castShadow = true;
    tree.add(trunk);

    // Branches — random crooked sticks
    const branchCount = 2 + Math.floor(rand() * 4);
    for (let b = 0; b < branchCount; b++) {
      const bLen = 1.5 + rand() * 3;
      const bY = height * (0.4 + rand() * 0.5);
      const bAngle = rand() * Math.PI * 2;
      const bTilt = 0.3 + rand() * 0.8;
      const branch = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, trunkRadius * 0.3, bLen, 3),
        trunkMat
      );
      branch.position.set(Math.cos(bAngle) * 0.3, bY, Math.sin(bAngle) * 0.3);
      branch.rotation.z = bTilt * (bAngle > Math.PI ? 1 : -1);
      branch.rotation.y = bAngle;
      branch.castShadow = true;
      tree.add(branch);

      // Some trees have sparse dead leaf clumps
      if (rand() > 0.5) {
        const leaf = new THREE.Mesh(
          new THREE.SphereGeometry(0.5 + rand() * 0.8, 4, 3),
          rand() > 0.5 ? deadLeafMat : darkLeafMat
        );
        leaf.position.set(
          Math.cos(bAngle) * (bLen * 0.5),
          bY + 0.5,
          Math.sin(bAngle) * (bLen * 0.5)
        );
        leaf.scale.y = 0.6;
        leaf.castShadow = true;
        tree.add(leaf);
      }
    }

    // Slight random lean
    tree.rotation.x = (rand() - 0.5) * 0.1;
    tree.rotation.z = (rand() - 0.5) * 0.1;
    tree.position.set(x, 0, z);
    scene.add(tree);
  }

  // ── Bushes (low, rounded, dark) ──
  for (let i = 0; i < 100; i++) {
    const x = (rand() - 0.5) * (MAP_SIZE - 6);
    const z = (rand() - 0.5) * (MAP_SIZE - 6);
    if (checkBuildingCollision(x, z, 1.5)) continue;

    const bush = new THREE.Group();
    const clumps = 1 + Math.floor(rand() * 3);
    for (let c = 0; c < clumps; c++) {
      const s = 0.4 + rand() * 0.8;
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(s, 5, 4),
        rand() > 0.4 ? bushMat : deadBushMat
      );
      m.position.set((rand()-0.5)*0.8, s*0.6, (rand()-0.5)*0.8);
      m.scale.y = 0.6 + rand() * 0.3;
      m.castShadow = true;
      bush.add(m);
    }
    bush.position.set(x, 0, z);
    scene.add(bush);
  }

  // ── Glowing mushroom clusters ──
  for (let i = 0; i < 30; i++) {
    const x = (rand() - 0.5) * (MAP_SIZE - 10);
    const z = (rand() - 0.5) * (MAP_SIZE - 10);
    if (checkBuildingCollision(x, z, 1)) continue;

    const cluster = new THREE.Group();
    const count = 2 + Math.floor(rand() * 4);
    for (let m = 0; m < count; m++) {
      const h = 0.2 + rand() * 0.5;
      const capR = 0.15 + rand() * 0.25;
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, h, 4), mushroomStemMat);
      stem.position.set((rand()-0.5)*0.6, h/2, (rand()-0.5)*0.6);
      cluster.add(stem);
      const cap = new THREE.Mesh(new THREE.SphereGeometry(capR, 5, 4), mushroomCapMat);
      cap.scale.y = 0.4;
      cap.position.set(stem.position.x, h + capR*0.2, stem.position.z);
      cluster.add(cap);
    }
    // Faint eerie glow
    const glow = new THREE.PointLight(0x44aa44, 0.4, 4);
    glow.position.y = 0.3;
    cluster.add(glow);
    cluster.position.set(x, 0, z);
    scene.add(cluster);
  }

  // ── Gravestones scattered around ──
  for (let i = 0; i < 40; i++) {
    const x = (rand() - 0.5) * (MAP_SIZE - 10);
    const z = (rand() - 0.5) * (MAP_SIZE - 10);
    if (checkBuildingCollision(x, z, 1)) continue;

    const grave = new THREE.Group();
    const stone = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 0.8 + rand()*0.5, 0.15),
      graveMat
    );
    stone.position.y = stone.geometry.parameters.height / 2;
    stone.rotation.y = rand() * 0.3 - 0.15;
    stone.castShadow = true;
    grave.add(stone);
    // Rounded top
    const top = new THREE.Mesh(new THREE.SphereGeometry(0.3, 5, 4), graveMat);
    top.scale.set(1, 0.5, 0.5);
    top.position.y = stone.geometry.parameters.height;
    grave.add(top);
    // Slight tilt — old and crumbling
    grave.rotation.z = (rand() - 0.5) * 0.2;
    grave.rotation.x = (rand() - 0.5) * 0.1;
    grave.position.set(x, 0, z);
    scene.add(grave);
  }

  // ── Fallen logs ──
  for (let i = 0; i < 20; i++) {
    const x = (rand() - 0.5) * (MAP_SIZE - 10);
    const z = (rand() - 0.5) * (MAP_SIZE - 10);
    if (checkBuildingCollision(x, z, 2)) continue;
    const len = 2 + rand() * 4;
    const log = new THREE.Mesh(
      new THREE.CylinderGeometry(0.2, 0.25, len, 5),
      trunkMat
    );
    log.rotation.z = Math.PI / 2;
    log.rotation.y = rand() * Math.PI;
    log.position.set(x, 0.2, z);
    log.castShadow = true;
    scene.add(log);
  }
}

function spawnWave() {
  sfxWave();
  const count = 5 + wave * 3;
  document.getElementById('wave-num').textContent = wave;
  const a = document.getElementById('wave-announce');
  a.textContent = `WAVE ${wave}`; a.style.opacity = 1;
  setTimeout(() => a.style.opacity = 0, 2000);
  for (let i = 0; i < count; i++) spawnZombie();
  if (isHost) sendMsg({ type: 'wave', wave });
}

function spawnZombieMesh() {
  const z = new THREE.Group();
  const b = new THREE.Mesh(new THREE.BoxGeometry(0.7,1.3,0.4), new THREE.MeshLambertMaterial({color:0x446633}));
  b.position.y=1.15; b.castShadow=true; z.add(b);
  const h = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.45,0.45), new THREE.MeshLambertMaterial({color:0x668844}));
  h.position.y=2.05; h.castShadow=true; z.add(h);
  const am = new THREE.MeshLambertMaterial({color:0x668844});
  const la=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.7),am); la.position.set(-0.5,1.3,-0.3); z.add(la);
  const ra=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.7),am); ra.position.set(0.5,1.3,-0.3); z.add(ra);
  scene.add(z);
  zombies.push({mesh:z, speed:ZOMBIE_BASE_SPEED, hp:1, maxHp:1, attackCooldown:0});
}

function spawnZombie() {
  setTimeout(sfxZombieSpawn, Math.random() * 800); // stagger groans
  const z = new THREE.Group();
  const b = new THREE.Mesh(new THREE.BoxGeometry(0.7,1.3,0.4), new THREE.MeshLambertMaterial({color:0x446633}));
  b.position.y=1.15; b.castShadow=true; z.add(b);
  const h = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.45,0.45), new THREE.MeshLambertMaterial({color:0x668844}));
  h.position.y=2.05; h.castShadow=true; z.add(h);
  const am = new THREE.MeshLambertMaterial({color:0x668844});
  const la=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.7),am); la.position.set(-0.5,1.3,-0.3); z.add(la);
  const ra=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.7),am); ra.position.set(0.5,1.3,-0.3); z.add(ra);
  const angle=Math.random()*Math.PI*2, dist=50+Math.random()*40;
  z.position.set(Math.max(-MAP_SIZE/2+2,Math.min(MAP_SIZE/2-2,Math.cos(angle)*dist)),0,Math.max(-MAP_SIZE/2+2,Math.min(MAP_SIZE/2-2,Math.sin(angle)*dist)));
  scene.add(z);
  const speed=ZOMBIE_BASE_SPEED+Math.random()*1.5+wave*0.3, hp=1+Math.floor(wave/3);
  zombies.push({mesh:z,speed,hp,maxHp:hp,attackCooldown:0});
}

function shoot() {
  if (gameOver || dead || reloading || ammo <= 0) return;
  sfxShoot();
  ammo--; updateAmmoDisplay();
  const dir = new THREE.Vector3().subVectors(mouseWorldPos, player.position); dir.y=0; dir.normalize();
  const origin = player.position.clone().add(new THREE.Vector3(0,1.2,0)).add(dir.clone().multiplyScalar(0.8));
  const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.12,4,4), new THREE.MeshBasicMaterial({color:0xffff44}));
  bullet.position.copy(origin); scene.add(bullet);
  bullets.push({mesh:bullet, dir:dir.clone(), life:2.0, ownerId:myId});
  const flash = new THREE.PointLight(0xffaa00,3,8); flash.position.copy(origin); scene.add(flash);
  setTimeout(()=>scene.remove(flash),50);
  sendMsg({type:'shoot', ox:origin.x,oy:origin.y,oz:origin.z, dx:dir.x,dy:dir.y,dz:dir.z});
  if (ammo===0) reload();
}

function reload() {
  if (reloading||ammo===maxAmmo) return;
  sfxReload();
  reloading=true;
  document.getElementById('ammo-display').textContent='RELOADING...';
  setTimeout(()=>{ammo=maxAmmo;reloading=false;updateAmmoDisplay();},1500);
}
function updateAmmoDisplay() { if(!reloading) document.getElementById('ammo-display').textContent=`AMMO: ${ammo} / ${maxAmmo}`; }

function checkBuildingCollision(x,z,radius) {
  for(const b of buildings) if(Math.max(0,Math.abs(x-b.x)-b.hw)<radius && Math.max(0,Math.abs(z-b.z)-b.hd)<radius) return true;
  return false;
}

function createBloodSplat(x,z) {
  const s=new THREE.Mesh(new THREE.CircleGeometry(0.3+Math.random()*0.4,6),new THREE.MeshBasicMaterial({color:0x880000,transparent:true,opacity:0.7}));
  s.rotation.x=-Math.PI/2; s.position.set(x,0.02,z); scene.add(s);
  bloodSplats.push({mesh:s,life:10});
  if(bloodSplats.length>100){scene.remove(bloodSplats.shift().mesh);}
}

function damagePlayer(amount) {
  sfxPlayerHit();
  playerHealth = Math.max(0, playerHealth - amount);
  const bar = document.getElementById('health-bar');
  bar.style.width = playerHealth + '%';
  bar.style.background = playerHealth > 50 ? '#4f4' : playerHealth > 25 ? '#ff4' : '#f44';
  if (playerHealth <= 0 && !dead) {
    dead = true;
    gameOver = true;
    player.visible = false;
    sendMsg({ type: 'player_died' });
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-kills').textContent = zombieKills;
    document.getElementById('final-pks').textContent = playerKills;
    document.getElementById('final-wave').textContent = wave;
  }
}

function respawn() {
  // Random spawn position
  const angle = Math.random() * Math.PI * 2;
  const dist = 15 + Math.random() * 30;
  player.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
  playerHealth = 100; dead = false; gameOver = false; ammo = maxAmmo; reloading = false;
  player.visible = true;
  document.getElementById('health-bar').style.width = '100%';
  document.getElementById('health-bar').style.background = '#4f4';
  document.getElementById('game-over').style.display = 'none';
  updateAmmoDisplay();
  animate();
}

function drawMinimap() {
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  const size=160; canvas.width=size; canvas.height=size;
  const scale=size/MAP_SIZE;
  ctx.fillStyle='#111'; ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#555';
  buildings.forEach(b=>{ctx.fillRect((b.x-b.hw+MAP_SIZE/2)*scale,(b.z-b.hd+MAP_SIZE/2)*scale,b.hw*2*scale,b.hd*2*scale);});
  ctx.fillStyle='#4a3';
  zombies.forEach(z=>{ctx.fillRect((z.mesh.position.x+MAP_SIZE/2)*scale-1.5,(z.mesh.position.z+MAP_SIZE/2)*scale-1.5,3,3);});
  // Local
  if(!dead){
    ctx.fillStyle=hexStr(colorForId(myId||1));
    ctx.beginPath(); ctx.arc((player.position.x+MAP_SIZE/2)*scale,(player.position.z+MAP_SIZE/2)*scale,3,0,Math.PI*2); ctx.fill();
  }
  // Remote
  for(const id of Object.keys(remotePlayers)){
    const rp=remotePlayers[id]; if(rp.dead) continue;
    ctx.fillStyle=hexStr(colorForId(Number(id)));
    ctx.beginPath(); ctx.arc((rp.mesh.position.x+MAP_SIZE/2)*scale,(rp.mesh.position.z+MAP_SIZE/2)*scale,3,0,Math.PI*2); ctx.fill();
  }
}

// ── GAME LOOP ──
function animate() {
  if (gameOver) { renderer.render(scene,camera); drawMinimap(); return; }
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  // Player movement
  if (!dead) {
    const mv = new THREE.Vector3();
    // Keyboard input
    if(keys['w']||keys['arrowup']) mv.z-=1;
    if(keys['s']||keys['arrowdown']) mv.z+=1;
    if(keys['a']||keys['arrowleft']) mv.x-=1;
    if(keys['d']||keys['arrowright']) mv.x+=1;
    // Touch joystick input (left stick)
    if(touchMove.active) { mv.x+=touchMove.dx; mv.z+=touchMove.dz; }

    if(mv.length()>0){
      mv.normalize();
      const nx=player.position.x+mv.x*playerSpeed*dt, nz=player.position.z+mv.z*playerSpeed*dt, half=MAP_SIZE/2-1;
      if(!checkBuildingCollision(nx,player.position.z,0.6)) player.position.x=Math.max(-half,Math.min(half,nx));
      if(!checkBuildingCollision(player.position.x,nz,0.6)) player.position.z=Math.max(-half,Math.min(half,nz));
      player.rotation.y=Math.atan2(mv.x,mv.z)+Math.PI;
      player.position.y=Math.abs(Math.sin(clock.elapsedTime*10))*0.15;
    } else { player.position.y=0; }

    // Mouse aim (desktop)
    if (!isTouchDevice) {
      raycaster.setFromCamera(mouse,camera);
      const pt=new THREE.Vector3();
      if(raycaster.ray.intersectPlane(groundPlane,pt)){
        mouseWorldPos.copy(pt);
        const ad=new THREE.Vector3().subVectors(pt,player.position); ad.y=0;
        if(ad.length()>0.1) gunPivot.rotation.y=Math.atan2(ad.x,ad.z)-player.rotation.y;
      }
    }

    // Touch aim (right stick) + auto-fire
    if (touchAim.active && (Math.abs(touchAim.dx) > 0.15 || Math.abs(touchAim.dz) > 0.15)) {
      // Aim direction from joystick maps to world XZ
      const aimAngle = Math.atan2(touchAim.dx, touchAim.dz);
      gunPivot.rotation.y = aimAngle - player.rotation.y + Math.PI;
      // Set mouseWorldPos so shoot() uses correct direction
      const aimDir = new THREE.Vector3(touchAim.dx, 0, touchAim.dz).normalize();
      mouseWorldPos.copy(player.position).add(aimDir.multiplyScalar(20));
      // Auto-fire
      mobileShootTimer -= dt;
      if (mobileShootTimer <= 0) {
        shoot();
        mobileShootTimer = MOBILE_SHOOT_RATE;
      }
    } else {
      mobileShootTimer = 0; // reset so first shot is instant
    }
  }

  // Send position
  syncTimer+=dt;
  if(syncTimer>=SYNC_RATE){
    syncTimer=0;
    sendMsg({type:'position',x:player.position.x,z:player.position.z,y:player.position.y,rotY:player.rotation.y,gunRotY:gunPivot.rotation.y,dead});
  }

  // Interpolate remote players
  for(const id of Object.keys(remotePlayers)){
    const rp=remotePlayers[id]; const l=10*dt;
    rp.mesh.position.x+=(rp.targetX-rp.mesh.position.x)*l;
    rp.mesh.position.z+=(rp.targetZ-rp.mesh.position.z)*l;
    rp.mesh.position.y+=(rp.targetY-rp.mesh.position.y)*l;
    rp.mesh.rotation.y+=(rp.targetRotY-rp.mesh.rotation.y)*l;
    rp.gunPivot.rotation.y+=(rp.targetGunRotY-rp.gunPivot.rotation.y)*l;
  }

  // Rain
  const rArr=rain.geometry.attributes.position.array;
  for(let i=0;i<rArr.length;i+=3){rArr[i+1]-=25*dt;if(rArr[i+1]<0){rArr[i]=player.position.x+(Math.random()-0.5)*140;rArr[i+1]=30+Math.random()*10;rArr[i+2]=player.position.z+(Math.random()-0.5)*140;}}
  rain.geometry.attributes.position.needsUpdate=true;

  // Camera
  const ct=new THREE.Vector3(player.position.x,0,player.position.z);
  camera.position.x+=(ct.x-camera.position.x)*3*dt;
  camera.position.z+=(ct.z-camera.position.z+28)*3*dt;
  camera.position.y+=(28-camera.position.y)*3*dt;
  camera.lookAt(ct);

  // Bullets
  const bs=40;
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.mesh.position.add(b.dir.clone().multiplyScalar(bs*dt));
    b.life-=dt;
    let hit=false;

    // Hit zombies
    for(let j=zombies.length-1;j>=0;j--){
      const z=zombies[j];
      if(b.mesh.position.distanceTo(z.mesh.position.clone().add(new THREE.Vector3(0,1,0)))<1.0){
        z.hp--; createBloodSplat(z.mesh.position.x,z.mesh.position.z);
        if(z.hp<=0){
          sfxZombieDeath();
          for(let s=0;s<3;s++) createBloodSplat(z.mesh.position.x+(Math.random()-0.5)*1.5,z.mesh.position.z+(Math.random()-0.5)*1.5);
          scene.remove(z.mesh); zombies.splice(j,1);
          if(b.ownerId===myId){ zombieKills++; document.getElementById('kill-count').textContent=zombieKills; }
          sendMsg({type:'zombie_kill',index:j});
          if(scores[b.ownerId]) scores[b.ownerId].zombie++;
          updateScoreboard();
        }
        hit=true; break;
      }
    }

    // Hit other players (PvP!)
    if(!hit && b.ownerId !== myId) {
      // Check if it hits local player
      if(!dead && b.mesh.position.distanceTo(player.position.clone().add(new THREE.Vector3(0,1,0)))<1.0){
        damagePlayer(15);
        createBloodSplat(player.position.x, player.position.z);
        hit=true;
      }
    }
    // Local bullets hitting remote players — tell them
    if(!hit && b.ownerId === myId){
      for(const rid of Object.keys(remotePlayers)){
        const rp=remotePlayers[rid]; if(rp.dead) continue;
        if(b.mesh.position.distanceTo(rp.mesh.position.clone().add(new THREE.Vector3(0,1,0)))<1.0){
          createBloodSplat(rp.mesh.position.x, rp.mesh.position.z);
          sendMsg({type:'player_hit', targetId:Number(rid), killed:false});
          // We mark killed on the target's side
          hit=true;
          playerKills; // damage tracked on their end
          break;
        }
      }
    }

    if(!hit && checkBuildingCollision(b.mesh.position.x,b.mesh.position.z,0.2)) hit=true;
    if(hit||b.life<=0){scene.remove(b.mesh);bullets.splice(i,1);}
  }

  // Zombies (host runs AI)
  if(isHost){
    const targets=[];
    if(!dead) targets.push(player.position.clone());
    for(const id of Object.keys(remotePlayers)){ if(!remotePlayers[id].dead) targets.push(remotePlayers[id].mesh.position.clone()); }
    if(targets.length===0) targets.push(new THREE.Vector3(0,0,0)); // wander center

    for(const z of zombies){
      let nearest=targets[0],nd=Infinity;
      for(const t of targets){const d=z.mesh.position.distanceTo(t);if(d<nd){nd=d;nearest=t;}}
      const tt=new THREE.Vector3().subVectors(nearest,z.mesh.position); tt.y=0;
      const dist=tt.length();
      if(dist>0.5){
        const dir=tt.normalize();
        const nx=z.mesh.position.x+dir.x*z.speed*dt, nz=z.mesh.position.z+dir.z*z.speed*dt;
        if(!checkBuildingCollision(nx,z.mesh.position.z,0.5)) z.mesh.position.x=nx;
        else z.mesh.position.z+=(Math.random()>0.5?1:-1)*z.speed*dt;
        if(!checkBuildingCollision(z.mesh.position.x,nz,0.5)) z.mesh.position.z=nz;
        else z.mesh.position.x+=(Math.random()>0.5?1:-1)*z.speed*dt;
        z.mesh.rotation.y=Math.atan2(dir.x,dir.z)+Math.PI;
        z.mesh.position.y=Math.abs(Math.sin(clock.elapsedTime*6+z.speed))*0.1;
      }
      // Damage local player only
      if(!dead){const d=player.position.distanceTo(z.mesh.position);if(d<1.5){z.attackCooldown-=dt;if(z.attackCooldown<=0){damagePlayer(8+Math.floor(wave/2));z.attackCooldown=0.8;}}}
    }

    // Sync zombies
    if(syncTimer===0 && zombies.length>0){
      sendMsg({type:'zombie_sync',zombies:zombies.map(z=>({x:z.mesh.position.x,y:z.mesh.position.y,z:z.mesh.position.z,ry:z.mesh.rotation.y,hp:z.hp,speed:z.speed}))});
    }
    if(zombies.length===0){wave++;spawnWave();}
  } else {
    // Guest: zombie damage
    if(!dead) for(const z of zombies){
      const d=player.position.distanceTo(z.mesh.position);
      if(d<1.5){z.attackCooldown-=dt;if(z.attackCooldown<=0){damagePlayer(8+Math.floor(wave/2));z.attackCooldown=0.8;}}
    }
  }

  // Zombie ambient moans
  zombieMoanTimer -= dt;
  if (zombieMoanTimer <= 0 && zombies.length > 0) {
    // Pick a random zombie within earshot
    const nearby = zombies.filter(z => z.mesh.position.distanceTo(player.position) < 40);
    if (nearby.length > 0) sfxZombieMoan();
    zombieMoanTimer = 0.8 + Math.random() * 2; // every 0.8-2.8 seconds
  }

  // Blood fade
  for(let i=bloodSplats.length-1;i>=0;i--){
    bloodSplats[i].life-=dt;
    if(bloodSplats[i].life<2) bloodSplats[i].mesh.material.opacity=bloodSplats[i].life/2;
    if(bloodSplats[i].life<=0){scene.remove(bloodSplats[i].mesh);bloodSplats.splice(i,1);}
  }

  renderer.render(scene,camera);
  drawMinimap();
}

init();
</script>
</body>
